services:
  nginx:
    image: nginx:latest
    container_name: thanhduy-nginx-realtime
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - socket1
      - socket2

  redis:
    image: redis:7-alpine
    container_name: thanhduy-redis

  socket1:
    build: .
    container_name: thanduy-socket1
    expose:
      - "4000"
    command: npm run dev

  socket2:
    build: .
    container_name: thanduy-socket2
    expose:
      - "4000"
    command: npm run dev