services:
  nginx:
    image: nginx:latest
    container_name: thanhduy-nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
  
  backend1:
    build: .
    container_name: thanhduy-backend1
    expose:
      - "4000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  backend2:
    build: .
    container_name: thanhduy-backend2
    expose:
      - "4000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev